name: isscai

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: isscai-backend
    env_file:
      - .env
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: isscai-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
